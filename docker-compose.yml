services:
  sgw-mcp:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SGW_MCP_HOST: 0.0.0.0
      SGW_MCP_PORT: "8100"
      SGW_MCP_URL: ${SGW_MCP_URL:-http://localhost:8100}
    ports:
      - "8100:8100"
    volumes:
      - sgw-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8100/', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sgw-data:
