# Official scrape-gateway extension registry.
# Submit a PR to add your extension.
# Extensions can provide ProviderAdapter classes or register CLI commands.
#
# Fields:
#   name:        unique extension name (used in `sgw extensions <name>`)
#   package:     PyPI package name (defaults to name if omitted)
#   type:        provider | command
#   description: what it does, one line
#   url:         source repo or package location
#   status:      available | planned

- name: sg-sitemap
  type: command
  description: Sitemap discovery via Trafilatura — adds `sgw sitemap`
  package: sg-sitemap
  url: https://github.com/testy-cool/scrape-gateway/tree/main/extensions/sg-sitemap
  status: planned

- name: sg-cache
  type: command
  description: Cache inspection and cleanup — adds `sgw cache`
  package: sg-cache
  url: https://github.com/testy-cool/scrape-gateway/tree/main/extensions/sg-cache
  status: planned

