# Official scrape-gateway extension registry.
# Submit a PR to add your extension.
# Extensions can provide ProviderAdapter classes or register CLI commands.
#
# Fields:
#   name:        unique extension name (used in `sgw extensions <name>`)
#   package:     PyPI package name (defaults to name if omitted)
#   type:        provider | command
#   description: what it does, one line
#   url:         source repo or package location
#   status:      available | planned

- name: sg-sitemap
  type: command
  description: Sitemap discovery via Trafilatura — adds `sgw sitemap`
  package: sg-sitemap
  url: https://github.com/testy-cool/scrape-gateway/tree/main/extensions/sg-sitemap
  status: planned

- name: sg-amazon-paapi
  type: provider
  description: Amazon Product Advertising API — structured product data, no proxies needed
  url: https://github.com/scrape-gateway/sg-amazon-paapi
  status: planned

- name: sg-playwright
  type: provider
  description: Full browser rendering via Playwright — JS-heavy sites, SPAs, screenshots
  url: https://github.com/scrape-gateway/sg-playwright
  status: planned

- name: sg-selenium
  type: provider
  description: Selenium with undetected-chromedriver — stealth browser for anti-bot sites
  url: https://github.com/scrape-gateway/sg-selenium
  status: planned

- name: sg-ddgs
  type: provider
  description: DuckDuckGo search — text, images, news, videos. Free, no API key needed
  package: duckduckgo-search
  url: https://github.com/scrape-gateway/sg-ddgs
  status: planned

- name: sg-wayback
  type: provider
  description: Wayback Machine snapshots — fetch archived versions of any page
  url: https://github.com/scrape-gateway/sg-wayback
  status: planned
