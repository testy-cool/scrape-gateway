# Official scrape-gateway extension registry.
# Submit a PR to add your extension.
# Extensions must subclass ProviderAdapter from scrape_gateway.
#
# Fields:
#   name:        unique extension name (used in `sg extensions <name>`)
#   package:     PyPI package name (defaults to name if omitted)
#   description: what it does, one line
#   url:         source repo
#   status:      available | planned

- name: sg-amazon-paapi
  description: Amazon Product Advertising API — structured product data, no proxies needed
  url: https://github.com/scrape-gateway/sg-amazon-paapi
  status: planned

- name: sg-playwright
  description: Full browser rendering via Playwright — JS-heavy sites, SPAs, screenshots
  url: https://github.com/scrape-gateway/sg-playwright
  status: planned

- name: sg-selenium
  description: Selenium with undetected-chromedriver — stealth browser for anti-bot sites
  url: https://github.com/scrape-gateway/sg-selenium
  status: planned
