# Copy to scrape-gateway.yml and fill in your API keys in .env

cache:
  ttl: 24h
  root: .scrape-gateway/artifacts

providers:
  - name: raw_http
    enabled: true

  - name: wreq
    enabled: true
    # TLS-fingerprinted HTTP (pip install wreq). No API key needed.

  - name: curl_cffi
    enabled: true
    # TLS-fingerprinted HTTP (pip install curl_cffi). No API key needed.

  - name: scrapedrive
    enabled: true
    # api_key_env: SCRAPEDRIVE_API_KEY  (reads from .env automatically)

  - name: scrape_do
    enabled: false

  - name: scrapingbee
    enabled: false

  - name: scraperapi
    enabled: false

strategy:
  mode: cheapest_successful
  # max_cost_per_url: 0.10

telemetry:
  enabled: true
  root: .scrape-gateway/runs
  debug_artifacts: false

# Optional, non-blocking AI scrape-usability audit through OpenRouter.
# Set OPENROUTER_API_KEY in .env before changing mode to audit.
evaluation:
  mode: "off"
  model: google/gemini-3.1-flash-lite
  max_markdown_chars: 30000
  include_screenshot: true
  cache_root: .scrape-gateway/evaluations
